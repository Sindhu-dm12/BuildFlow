<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Flow — Dependency Map</title>
    <link rel="stylesheet" href="/uncia.css">
</head>
<body>
    <aside id="sidebar"></aside>
    <main id="main">
        <div class="page-header">
            <div class="page-title">Dependency Map</div>
            <div class="page-subtitle">Cross-project issue links</div>
        </div>
        <div class="content">
            <div class="controls">
                <input id="projectsInput" class="form-input" style="min-width:320px" placeholder="Projects (comma separated): UNCIA,WEB,MOB">
                <button class="btn btn-primary" onclick="loadDependency()">Load Graph</button>
            </div>
            <div id="msg" class="msg"></div>

            <div class="stats-grid" id="stats" style="display:none;">
                <div class="stat-card"><div class="stat-label">Nodes</div><div class="stat-value" id="totalNodes">—</div></div>
                <div class="stat-card"><div class="stat-label">Edges</div><div class="stat-value" id="totalEdges">—</div></div>
                <div class="stat-card"><div class="stat-label">Cross-Project</div><div class="stat-value" id="crossEdges">—</div></div>
                <div class="stat-card"><div class="stat-label">Blocking Links</div><div class="stat-value" id="blockingCount">—</div></div>
            </div>

            <div class="card" id="edgesCard" style="display:none;">
                <div class="card-title">Top Dependencies</div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Source</th>
                                <th>Target</th>
                                <th>Type</th>
                                <th>Cross Project</th>
                            </tr>
                        </thead>
                        <tbody id="edgesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/shared.js"></script>
    <script>
        function showMsg(text, type = 'info') {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = `msg ${type}`;
        }

        async function init() {
            const user = await initPage('dependency');
            if (!user) return;
            try {
                const res = await fetch(`${API_BASE}/jira/projects`, { credentials: 'include' });
                const data = await res.json();
                const projects = data.projects || [];
                if (res.ok && projects.length) {
                    document.getElementById('projectsInput').value = projects.slice(0, 3).map(p => p.key).join(',');
                }
            } catch (_) {}
        }

        async function loadDependency() {
            const raw = document.getElementById('projectsInput').value.trim();
            const qs = raw ? `?projects=${encodeURIComponent(raw)}` : '';
            showMsg('Loading dependency map...', 'info');
            try {
                const res = await fetch(`${API_BASE}/dependency${qs}`, { credentials: 'include' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to load dependency map');

                document.getElementById('stats').style.display = 'grid';
                document.getElementById('edgesCard').style.display = 'block';
                document.getElementById('totalNodes').textContent = data.total_nodes || 0;
                document.getElementById('totalEdges').textContent = data.total_edges || 0;
                document.getElementById('crossEdges').textContent = data.cross_proj_edges || 0;
                document.getElementById('blockingCount').textContent = data.blocking_count || 0;

                const rows = (data.edges || []).slice(0, 30);
                document.getElementById('edgesBody').innerHTML = rows.length ? rows.map(e => `
                    <tr>
                        <td>${e.source}</td>
                        <td>${e.target}</td>
                        <td>${e.type}</td>
                        <td>${e.cross_proj ? 'Yes' : 'No'}</td>
                    </tr>
                `).join('') : '<tr><td colspan="4" class="empty-state">No dependency edges found.</td></tr>';

                showMsg(`Loaded dependencies for ${data.projects.join(', ')}.`, 'success');
            } catch (err) {
                showMsg(err.message, 'error');
            }
        }

        init();
    </script>
</body>
</html>
